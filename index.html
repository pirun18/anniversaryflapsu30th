            modal_ai_generating: 'Composing your wish...',

            export_print_btn: 'Save as PDF / Print Report',
            export_anonymous_label: 'Anonymous Well-wisher',
            export_notes: 'This document was dynamically generated by the register and well-wishing board for the 30th Anniversary of the Faculty of Liberal Arts, PSU (September 13, 2027).'

        };

        function App() {
          const [lang, setLang] = useState('th'); // 'th' or 'en'
          const [currentPage, setCurrentPage] = useState('write'); // 'write' or 'view' or 'admin'
          const [wishes, setWishes] = useState(() => {
            try {
              const saved = localStorage.getItem('fla_psu_30_wishes');
              return saved ? JSON.parse(saved) : INITIAL_WISHES;
            } catch {
              return INITIAL_WISHES;
            }
          });
          
          // Form States
          const [senderName, setSenderName] = useState('');
          const [wishMessage, setWishMessage] = useState('');
          const [isAnonymous, setIsAnonymous] = useState(false);
          const [selectedStyle, setSelectedStyle] = useState('gold-elegant');
          const [senderRole, setSenderRole] = useState('นักศึกษาปัจจุบัน');
          
          // AI Generator States
          const [aiRole, setAiRole] = useState('alumni');
          const [aiTone, setAiTone] = useState('touching');
          const [isAiGenerating, setIsAiGenerating] = useState(false);
          const [aiError, setAiError] = useState('');
          const [showAiModal, setShowAiModal] = useState(false);

          // Filter & Admin states
          const [filterRole, setFilterRole] = useState('ทั้งหมด');
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
          const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
          const [adminLoginError, setAdminLoginError] = useState('');
          const [adminSearchQuery, setAdminSearchQuery] = useState('');
          
          // Dialog / Edit states
          const [wishToDelete, setWishToDelete] = useState(null);
          const [wishToEdit, setWishToEdit] = useState(null); // stores the copy of the wish being edited

          // Sparkles Effect State
          const [sparkles, setSparkles] = useState([]);

          // Countdown timer State for Sept 13, 2027
          const [countdown, setCountdown] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

          const t = TRANSLATIONS[lang];

          const getRoleLabel = (dbRole) => {
            const roleMapping = {
              'นักศึกษาปัจจุบัน': t.form_role_student,
              'อาจารย์': t.form_role_faculty,
              'บุคลากร': t.form_role_staff,
              'ศิษย์เก่า': t.form_role_alumni,
              'บุคคลทั่วไป': t.form_role_general
            };
            return roleMapping[dbRole] || dbRole;
          };

          const getSenderNameLabel = (wish) => {
            if (wish.isAnonymous) {
              return t.anonymous_user;
            }
            return wish.name;
          };

          useEffect(() => {
            try {
              localStorage.setItem('fla_psu_30_wishes', JSON.stringify(wishes));
            } catch (e) {
              console.warn("Storage limits failed");
            }
          }, [wishes]);

          useEffect(() => {
            const targetDate = new Date('2027-09-13T00:00:00+07:00');
            
            const updateCountdown = () => {
              const now = new Date();
              const difference = targetDate.getTime() - now.getTime();
              
              if (difference <= 0) {
                setCountdown({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                return;
              }
              
              const days = Math.floor(difference / (1000 * 60 * 60 * 24));
              const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
              const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
              const seconds = Math.floor((difference % (1000 * 60)) / 1000);
              
              setCountdown({ days, hours, minutes, seconds });
            };

            updateCountdown();
            const interval = setInterval(updateCountdown, 1000);
            return () => clearInterval(interval);
          }, []);

          useEffect(() => {
            const generateSparkles = () => {
              const newSparkles = Array.from({ length: 20 }).map((_, i) => ({
                id: i,
                top: Math.random() * 100,
                left: Math.random() * 100,
                size: Math.random() * 4 + 2,
                delay: Math.random() * 5,
                duration: Math.random() * 5 + 4

              setSparkles(newSparkles);

            generateSparkles();

            setIsAiGenerating(true);
            setAiError('');
            
            const roleObj = AI_ROLES_DATA.find(r => r.id === aiRole);
            const toneObj = AI_TONES_DATA.find(t => t.id === aiTone);
            const roleText = lang === 'th' ? roleObj?.nameTH : roleObj?.nameEN;
            const toneText = lang === 'th' ? toneObj?.nameTH : toneObj?.nameEN;

            const systemPrompt = lang === 'th'

หน้าที่ของคุณคือช่วยแต่งคำอวยพรเนื่องในโอกาสครบรอบ 30 ปี วันสถาปนาคณะศิลปศาสตร์ มหาวิทยาลัยสงขลานครินทร์ (13 กันยายน 2570)
เขียนคำอวยพรที่ไพเราะ สละสลวย มีความหมายลึกซึ้ง และเหมาะสมกับบทบาทและโทนเสียงที่ผู้ใช้เลือก
บทบาทผู้เขียน: ${roleText}
โทนเสียงที่ต้องการ: ${toneText}

กฎเหล็ก:
- ส่งกลับเฉพาะข้อความอวยพรภาษาไทยเท่านั้น ไม่ต้องมีคำนำ เกริ่นนำ อธิบายเพิ่มเติม หรือคำว่า "นี่คือคำอวยพร"
- ใช้ภาษาไทยที่ถูกต้อง สละสลวย มีระดับ
- ความยาวประมาณ 2-4 ประโยค (พอเหมาะสำหรับการ์ดอวยพรทั่วไป)
- อย่าใส่เครื่องหมายอัญประกาศคู่คร่อมข้อความ`
              : `You are an expert copywriter representing the Faculty of Liberal Arts, Prince of Songkla University (FLA•PSU).
Your job is to generate a highly elegant and beautiful 30th Anniversary wishes card message (Celebrated on September 13, 2027).
Write a touching, sophisticated, and polished wish in English according to the chosen role and tone style.
Sender Role: ${roleText}
Desired Tone: ${toneText}

Rules:
- Return ONLY the congratulatory English wish text. Absolutely no introductory words, explanations, or quotes surrounding the response.
- Use immaculate, inspiring, and expressive English.
- Keep the length around 2 to 4 sentences (perfect size for a greeting card).`;

            const userPrompt = lang === 'th'
              ? `เขียนคำอวยพรฉลองครบรอบ 30 ปี คณะศิลปศาสตร์ ม.อ. หาดใหญ่ ในวันที่ 13 กันยายน 2570 โดยให้มีความหมายลึกซึ้ง เหมาะสมกับบทบาท ${roleText} ในสไตล์ ${toneText}`
              : `Write a stunning 30th anniversary greeting message for Prince of Songkla University, Faculty of Liberal Arts (FLA PSU) matching the sender role of "${roleText}" in a "${toneText}" style.`;

            try {
              const apiKey = "";
              const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

              const payload = {
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: {
                  parts: [{ text: systemPrompt }]
                }
              };

              const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });

              if (!response.ok) {
                throw new Error(lang === 'th' ? 'ขออภัย ระบบขัดข้องกรุณาลองใหม่อีกครั้ง' : 'System error. Please try again later.');
              }

              const result = await response.json();
              const candidateText = result.candidates?.[0]?.content?.parts?.[0]?.text;

              if (candidateText) {
                setWishMessage(candidateText.trim());
                setShowAiModal(false);
              } else {
                throw new Error(lang === 'th' ? 'ไม่สามารถสร้างคำอวยพรได้ในขณะนี้' : 'Failed to generate content.');
              }
            } catch (err) {
              console.error(err);
              setAiError(lang === 'th' 
                ? 'เกิดข้อผิดพลาดในการติดต่อผู้ช่วย AI กรุณาลองกรอกด้วยตนเองหรือทดลองใหม่อีกครั้ง' 
                : 'Failed to connect to the AI writing assistant. Please type your wishes manually.');
            } finally {
              setIsAiGenerating(false);
            }
          };

          const handleSubmitWish = (e) => {
            e.preventDefault();
            if (!wishMessage.trim()) return;

            const defaultAnonName = lang === 'th' ? 'ผู้ประสงค์ออกนามร่วมยินดี' : 'Anonymous Well-wisher';
            const defaultSenderName = lang === 'th' ? 'ผู้ร่วมอวยพร' : 'Well-wisher';
            const nameToDisplay = isAnonymous ? defaultAnonName : (senderName.trim() || defaultSenderName);
            
            const newWish = {
              id: `wish-${Date.now()}`,
              name: nameToDisplay,
              role: senderRole, // Stores core TH role as key in DB
              message: wishMessage.trim(),
              isAnonymous: isAnonymous,
              date: new Date().toISOString().split('T')[0],
              likes: 0,
              styleId: selectedStyle
            };

            setWishes([newWish, ...wishes]);
            
            // Reset form states
            setSenderName('');
            setWishMessage('');
            setIsAnonymous(false);
            
            // Jump to page 2 (View wishes)
            setCurrentPage('view');
          };

          const handleLikeWish = (wishId) => {
            setWishes(wishes.map(w => {
              if (w.id === wishId) {
                return { ...w, likes: w.likes + 1 };
              }
              return w;
            }));
          };

          const handleAdminLogin = (e) => {
            e.preventDefault();
            if (adminPasswordInput === 'FLAPSU30') {
              setIsAdminLoggedIn(true);
              setShowAdminLoginModal(false);
              setAdminPasswordInput('');
              setAdminLoginError('');
              setCurrentPage('admin');
            } else {
              setAdminLoginError(t.modal_login_error);
            }
          };

          const handleAdminLogout = () => {
            setIsAdminLoggedIn(false);
            setCurrentPage('view');
          };

          const handleDeleteWishConfirm = (wish) => {
            setWishToDelete(wish);
          };

          const executeDeleteWish = () => {
            if (wishToDelete) {
              setWishes(wishes.filter(w => w.id !== wishToDelete.id));
              setWishToDelete(null);
            }
          };

          const handleEditWishSelect = (wish) => {
            setWishToEdit({ ...wish });
          };

          const handleSaveEditedWish = (e) => {
            e.preventDefault();
            if (!wishToEdit.message.trim()) return;

            let updatedName = wishToEdit.name;
            const defaultAnonName = lang === 'th' ? 'ผู้ประสงค์ออกนามร่วมยินดี' : 'Anonymous Well-wisher';
            const defaultWellWisher = lang === 'th' ? 'ผู้ร่วมอวยพร' : 'Well-wisher';

            if (wishToEdit.isAnonymous && updatedName !== defaultAnonName) {
              updatedName = defaultAnonName;
            } else if (!wishToEdit.isAnonymous && updatedName === defaultAnonName) {
              updatedName = defaultWellWisher;
            }

            const updatedWishes = wishes.map(w => {
              if (w.id === wishToEdit.id) {
                return {
                  ...wishToEdit,
                  name: updatedName
                };
              }
              return w;
            });

            setWishes(updatedWishes);
            setWishToEdit(null);
          };

          const handleExportCSV = () => {
            const headers = [
              t.export_no, 
              t.export_name, 
              t.export_role, 
              t.export_msg, 
              t.export_is_anon, 
              t.export_date, 
              t.export_likes
            ];
            
            const rows = wishes.map((wish, index) => [
              index + 1,
              wish.isAnonymous ? (lang === 'th' ? 'ผู้ประสงค์ออกนาม' : 'Anonymous') : wish.name,
              getRoleLabel(wish.role),
              wish.message.replace(/"/g, '""'), // Escape double quotes
              wish.isAnonymous ? (lang === 'th' ? 'ใช่' : 'Yes') : (lang === 'th' ? 'ไม่ใช่' : 'No'),
              wish.date,
              wish.likes
            ]);

            const csvContent = [
              headers.join(','),
              ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');

            // Add UTF-8 BOM (\uFEFF) to make Excel parse Thai characters correctly
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `FLA_PSU_30th_Wishes_Report_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

                    }

                      font-weight: 700;
                      color: #1e3a8a;
                      margin: 0 0 8px 0;
                    }

                      font-size: 16px;
                      color: #475569;
                      margin: 0;
                    }
                    .summary-cards {
                      display: grid;
                      grid-template-cols: repeat(3, 1fr);
                      gap: 20px;
                      margin-bottom: 30px;
                    }
                    .card {
                      background-color: #f8fafc;
                      border: 1px solid #e2e8f0;
                      border-radius: 12px;
                      padding: 15px;
                      text-align: center;
                    }
                    .card-val {
                      font-size: 24px;
                      font-weight: 700;
                      color: #1e3a8a;
                      margin-bottom: 5px;
                    }
                    .card-lbl {
                      font-size: 12px;
                      color: #64748b;
                    }
                    table {

                  </style>
                </head>
                <body>
                  <div class="no-print" style="margin-bottom: 20px; text-align: right;">
                    <button onclick="window.print();" style="padding: 10px 20px; background-color: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: sans-serif; font-weight: bold; font-size: 13px;">${t.export_print_btn}</button>

                    <div class="card">
                      <div class="card-val">${wishes.reduce((acc, c) => acc + c.likes, 0)} ${lang === 'th' ? 'ดวง' : 'Likes'}</div>
                      <div class="card-lbl">${t.stats_likes_label}</div>
                    </div>
                    <div class="card">
                      <div class="card-val">${wishes.length > 0 ? ((wishes.filter(w => w.isAnonymous).length / wishes.length) * 100).toFixed(0) : 0}%</div>
                      <div class="card-lbl">${lang === 'th' ? 'สัดส่วนผู้ส่งไม่ระบุตัวตน' : 'Anonymity Settings Rate'}</div>
                    </div>
                  </div>

                  <table>
                    <thead>
                      <tr>
                        <th style="width: 7%; text-align: center; border-top-left-radius: 6px;">${t.export_no}</th>

                        <th style="width: 37%;">${t.export_msg}</th>

                      </tr>
                    </thead>

                      ${tableRows}
                    </tbody>

                  <div class="footer-notes">
                    ${t.export_notes}
                  </div>

          };

          return (
            <div className="min-h-screen bg-slate-950 text-white font-sans relative overflow-x-hidden selection:bg-amber-500 selection:text-slate-950">
              
              {/* Background Sparkles / Festive Atmosphere */}
              <div className="absolute inset-0 pointer-events-none overflow-hidden z-0">
                {sparkles.map((s) => (
                  <div
                    key={s.id}
                    className="absolute bg-amber-400 rounded-full opacity-60 animate-pulse"

              {/* Main Container */}

                          rows="3"
                          value={wishToEdit.message}
                          onChange={(e) => setWishToEdit({ ...wishToEdit, message: e.target.value })}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl py-2 px-3 text-xs text-slate-100 focus:outline-none focus:ring-1 focus:ring-amber-500"
                          maxLength={350}
                          required
                        />
                        <div className="text-right text-[10px] text-slate-500 mt-1">
                          {wishToEdit.message.length}/350 {lang === 'th' ? 'ตัวอักษร' : 'characters'}
                        </div>
                      </div>

                      {/* Anonymous Checkbox option inside modal */}
                      <div className="flex items-center justify-between bg-slate-950/60 p-2.5 rounded-xl border border-slate-850">
                        <span className="text-xs text-slate-300">{t.modal_edit_anon}</span>
                        <button
                          type="button"
                          onClick={() => setWishToEdit({ ...wishToEdit, isAnonymous: !wishToEdit.isAnonymous })}
                          className={`w-10 h-5 flex items-center rounded-full p-0.5 transition-colors ${wishToEdit.isAnonymous ? 'bg-amber-500' : 'bg-slate-800'}`}
                        >
                          <div className={`bg-slate-950 w-4 h-4 rounded-full shadow-md transform transition-transform duration-300 ${wishToEdit.isAnonymous ? 'translate-x-5' : 'translate-x-0'}`} />
                        </button>
                      </div>

                      {/* Theme Selector choice */}
                      <div>
                        <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">{t.modal_edit_theme}</label>
                        <select
                          value={wishToEdit.styleId}
                          onChange={(e) => setWishToEdit({ ...wishToEdit, styleId: e.target.value })}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl py-2 px-3 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-amber-500"
                        >
                          {CARD_STYLES.map(style => (
                            <option key={style.id} value={style.id}>{lang === 'th' ? style.nameTH : style.nameEN}</option>
                          ))}
                        </select>
                      </div>

                      {/* Action Buttons */}
                      <div className="flex gap-2 pt-2">
                        <button
                          type="button"
                          onClick={() => setWishToEdit(null)}
                          className="flex-1 py-2 bg-slate-950 hover:bg-slate-850 border border-slate-800 rounded-xl text-xs text-slate-400 hover:text-slate-200 transition-colors"
                        >
                          {t.modal_edit_cancel}
                        </button>
                        <button
                          type="submit"
                          className="flex-1 py-2 bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-bold rounded-xl text-xs hover:opacity-95 transition-all"
                        >
                          {t.modal_edit_save}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAL 2: ADMIN LOGIN MODAL */}
              {showAdminLoginModal && (
                <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
                  <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full shadow-2xl relative">
                    <button
                      onClick={() => {
                        setShowAdminLoginModal(false);
                        setAdminLoginError('');
                        setAdminPasswordInput('');
                      }}
                      className="absolute top-4 right-4 text-slate-400 hover:text-white"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>

                    <form onSubmit={handleAdminLogin} className="space-y-4">
                      <div className="text-center font-serif">
                        <div className="w-12 h-12 bg-amber-500/10 text-amber-400 rounded-full flex items-center justify-center mx-auto mb-3">
                          <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                          </svg>
                        </div>
                        <h3 className="text-lg font-bold text-slate-100">{t.modal_login_title}</h3>
                        <p className="text-xs text-slate-400 mt-1">{t.modal_login_desc}</p>
                        <p className="text-[10px] text-amber-400 mt-0.5">{t.modal_login_test_pass}</p>
                      </div>

                      <div>
                        <input
                          type="password"
                          value={adminPasswordInput}
                          onChange={(e) => setAdminPasswordInput(e.target.value)}
                          placeholder={t.modal_login_placeholder}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl py-2.5 px-3 text-xs text-center text-slate-100 focus:outline-none focus:ring-1 focus:ring-amber-500"
                          required
                          autoFocus
                        />
                      </div>

                      {adminLoginError && (
                        <div className="p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center rounded-xl font-medium">
                          {adminLoginError}
                        </div>
                      )}

                      <div className="flex gap-2">
                        <button
                          type="button"
                          onClick={() => {
                            setShowAdminLoginModal(false);
                            setAdminLoginError('');
                            setAdminPasswordInput('');
                          }}
                          className="flex-1 py-2 bg-slate-950 hover:bg-slate-800 border border-slate-850 rounded-xl text-xs text-slate-400 hover:text-slate-200 transition-colors"
                        >
                          {t.modal_edit_cancel}
                        </button>
                        <button
                          type="submit"
                          className="flex-1 py-2 bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-bold rounded-xl text-xs hover:opacity-95 transition-all"
                        >
                          {lang === 'th' ? 'เข้าสู่ระบบ' : 'Login'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAL 3: DELETE CONFIRMATION MODAL */}
              {wishToDelete && (
                <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-4 z-50">
                  <div className="bg-slate-900 border border-red-900/30 rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
                    <div className="text-center">
                      <div className="w-12 h-12 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                      </div>
                      <h3 className="text-lg font-bold text-slate-100 font-serif">{t.modal_delete_confirm_title}</h3>
                      <p className="text-xs text-slate-400 mt-1">
                        {t.modal_delete_confirm_desc.replace('{name}', getSenderNameLabel(wishToDelete))}
                      </p>
                      <div className="mt-3 p-3 bg-slate-950 rounded-xl border border-slate-850 text-left">
                        <p className="text-xs text-slate-400 italic font-serif">"{wishToDelete.message}"</p>
                      </div>
                    </div>

                    <div className="flex gap-2">
                      <button
                        onClick={() => setWishToDelete(null)}
                        className="flex-1 py-2 bg-slate-950 hover:bg-slate-850 border border-slate-800 text-slate-400 hover:text-slate-200 text-xs font-semibold rounded-xl transition-colors"
                      >
                        {t.modal_edit_cancel}
                      </button>
                      <button
                        onClick={executeDeleteWish}
                        className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white text-xs font-bold rounded-xl transition-colors"
                      >
                        {t.modal_delete_confirm_btn}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL 4: AI GENERATOR ASSISTANT MODAL */}
              {showAiModal && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
                  <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-md w-full shadow-2xl relative">
                    <button
                      onClick={() => {
                        setShowAiModal(false);
                        setAiError('');
                      }}
                      className="absolute top-4 right-4 text-slate-400 hover:text-white"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>

                    <div className="mb-6 font-serif">
                      <div className="w-12 h-12 bg-amber-500/10 text-amber-400 rounded-2xl flex items-center justify-center mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                        </svg>
                      </div>
                      <h3 className="text-lg font-bold text-slate-100">{t.modal_ai_title}</h3>
                      <p className="text-xs text-slate-400">{t.modal_ai_desc}</p>
                    </div>

                    <div className="space-y-4">
                      {/* Select AI Role */}
                      <div>
                        <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">{t.modal_ai_role}</label>
                        <select
                          value={aiRole}
                          onChange={(e) => setAiRole(e.target.value)}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl py-2.5 px-3 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-amber-500"
                        >
                          {AI_ROLES_DATA.map(r => (
                            <option key={r.id} value={r.id}>{lang === 'th' ? r.nameTH : r.nameEN}</option>
                          ))}
                        </select>
                      </div>

                      {/* Select AI Tone */}
                      <div>
                        <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">{t.modal_ai_tone}</label>
                        <select
                          value={aiTone}
                          onChange={(e) => setAiTone(e.target.value)}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl py-2.5 px-3 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-amber-500"
                        >
                          {AI_TONES_DATA.map(t => (
                            <option key={t.id} value={t.id}>{lang === 'th' ? t.nameTH : t.nameEN}</option>
                          ))}
                        </select>
                      </div>

                      {aiError && (
                        <div className="p-3 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs rounded-xl">
                          {aiError}
                        </div>
                      )}

                      <div className="pt-4 flex gap-2">
                        <button
                          onClick={() => {
                            setShowAiModal(false);
                            setAiError('');
                          }}
                          className="flex-1 py-2.5 bg-slate-950 hover:bg-slate-850 text-slate-400 hover:text-slate-200 border border-slate-850 rounded-xl text-xs font-bold transition-all duration-200"
                        >
                          {t.modal_edit_cancel}
                        </button>
                        <button
                          onClick={generateWishWithAI}
                          disabled={isAiGenerating}
                          className="flex-1 py-2.5 bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 rounded-xl text-xs font-bold hover:opacity-90 transition-all duration-200 flex justify-center items-center gap-1.5"
                        >
                          {isAiGenerating ? (
                            <>
                              <div className="w-4 h-4 border-2 border-slate-950 border-t-transparent rounded-full animate-spin"></div>
                              {t.modal_ai_generating}
                            </>
                          ) : (
                            <>
                              <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                                <path fillRule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clipRule="evenodd" />
                              </svg>
                              {t.modal_ai_generate_btn}
                            </>
                          )}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* Elegant Footer */}
              <footer className="mt-20 border-t border-slate-900 py-8 text-center text-xs text-slate-500 relative z-10 bg-slate-950/80">
                <p className="mb-2">{t.footer_copy}</p>
                <p className="text-slate-600">{t.footer_occasion}</p>
              </footer>

            </div>
          );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
